version: 2

before:
  hooks:
    - just build-multiarch-rs

builds:
  - id: ghost-spot
    main: ./cli
    binary: ghost-spot
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: just prepare-archive
          output: true

archives:
  - id: default
    ids: [ghost-spot]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: dist/bin/ghostify_{{ .Os }}_{{ .Arch }}
        dst: .
        strip_parent: true

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: anadinema
    name: ghostify

homebrew_casks:
  - name: ghostify
    repository:
      owner: anadinema
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/anadinema/ghostify"
    description: "ghostify — spotify-player TUI with proper macOS app bundle integration"
    # Both binaries are in the archive
    binaries: [ "ghost-spot", "ghostify" ]
    # Remove macOS quarantine (binaries are not notarized) and run install
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ghost-spot"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ghostify"]
          end
    url:
      verified: github.com/anadinema/ghostify
    caveats: |
      Run setup to configure spotify_player and set your device name:
        ghost-spot setup --preset work
        ghost-spot setup --preset personal
        ghost-spot setup --device-name "My Custom Name"
